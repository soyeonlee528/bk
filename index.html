<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MR 영업 스케줄러</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;margin:0;padding:48px 20px;color:#64748b;text-align:center;background:#f6f7f9}</style>
</head>
<body>
<div id="loading">불러오는 중…</div>
<script>
/* 실제 앱은 woorien의 schedule.html에서 가져옵니다. 이 파일은 다시 올릴 필요 없습니다. */
fetch("https://raw.githubusercontent.com/soyeonlee528/woorien/main/schedule.html", {cache:"no-store"})
  .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
  .then(function(h){ document.open(); document.write(h); document.close(); })
  .catch(function(e){ document.getElementById("loading").textContent = "앱을 불러오지 못했어요 ("+e+"). 잠시 후 새로고침 해주세요."; });
</script>
</body>
</html>
